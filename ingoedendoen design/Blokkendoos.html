<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blokkendoos — InGoedendoen bouwstenen</title>
<link rel="stylesheet" href="_ds/ingoedendoen-design-system-c7b6420c-4754-4083-b036-265964d0c5ff/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds/ingoedendoen-design-system-c7b6420c-4754-4083-b036-265964d0c5ff/_ds_bundle.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: var(--font-sans); background: var(--color-surface-page); color: var(--color-text-primary); -webkit-font-smoothing: antialiased; }
  #root { display: flex; flex-direction: column; min-height: 100%; }
  img { display: block; max-width: 100%; }

  /* Block section wrapper */
  .blok-section { padding: 48px 0; border-bottom: 1px solid var(--color-border-default); }
  .blok-section:last-child { border-bottom: none; }
  .blok-meta { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  .blok-nr { font-family: var(--font-display); font-size: 0.75rem; font-weight: 700; color: var(--color-lime-400); letter-spacing: 0.04em; }
  .blok-name { font-family: var(--font-sans); font-size: 0.875rem; font-weight: 700; color: var(--color-text-primary); }
  .blok-desc { font-family: var(--font-sans); font-size: 0.8125rem; color: var(--color-text-tertiary); margin-bottom: 28px; }
  .blok-preview { background: var(--color-neutral-50); border: 1px solid var(--color-border-default); border-radius: var(--radius-lg); padding: 32px; }

  /* ── 1. CTA blok ── */
  .igd-cta { background: var(--color-neutral-900); border-radius: var(--radius-lg); padding: 40px 40px; }

  /* ── 2. Quote ── */
  .igd-quote { border-left: 3px solid var(--color-lime-400); padding: 4px 0 4px 24px; }
  .igd-quote blockquote { font-family: var(--font-serif); font-size: 1.25rem; font-style: italic; line-height: 1.65; color: var(--color-text-primary); font-weight: 400; margin-bottom: 12px; }
  .igd-quote cite { font-family: var(--font-sans); font-size: 0.875rem; font-style: normal; color: var(--color-text-tertiary); display: block; }

  /* ── 3. Notice ── */
  .igd-notice { border-radius: var(--radius-md); padding: 16px 18px; display: flex; gap: 12px; align-items: flex-start; }
  .igd-notice-info { background: rgba(0,169,255,0.07); border: 1px solid rgba(0,169,255,0.25); }
  .igd-notice-warn { background: rgba(220,0,116,0.06); border: 1px solid rgba(220,0,116,0.2); }
  .igd-notice-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .igd-notice-icon-info { background: rgba(0,169,255,0.15); color: var(--color-blue-500); }
  .igd-notice-icon-warn { background: rgba(220,0,116,0.12); color: var(--color-pink-500); }
  .igd-notice-title { font-family: var(--font-sans); font-size: 0.875rem; font-weight: 700; margin-bottom: 3px; }
  .igd-notice-title-info { color: var(--color-blue-500); }
  .igd-notice-title-warn { color: var(--color-pink-500); }
  .igd-notice-body { font-family: var(--font-sans); font-size: 0.875rem; line-height: 1.62; color: var(--color-text-secondary); }

  /* ── 4. Genummerde lijst ── */
  .igd-numlist { display: flex; flex-direction: column; gap: 0; }
  .igd-numlist-item { display: flex; gap: 16px; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid var(--color-border-default); }
  .igd-numlist-item:last-child { border-bottom: none; }
  .igd-numlist-nr { font-family: var(--font-display); font-size: 1.25rem; font-weight: 800; color: var(--color-lime-400); line-height: 1.3; flex-shrink: 0; min-width: 28px; }
  .igd-numlist-text { font-family: var(--font-sans); font-size: 0.9375rem; line-height: 1.65; color: var(--color-text-primary); padding-top: 2px; }

  /* ── 5. Opsomming ── */
  .igd-bulletlist { display: flex; flex-direction: column; gap: 0; }
  .igd-bulletlist-item { display: flex; gap: 12px; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid var(--color-border-default); }
  .igd-bulletlist-item:last-child { border-bottom: none; }
  .igd-bullet { width: 7px; height: 7px; background: var(--color-lime-400); border-radius: 1px; flex-shrink: 0; margin-top: 8px; }
  .igd-bulletlist-text { font-family: var(--font-sans); font-size: 0.9375rem; line-height: 1.65; color: var(--color-text-primary); }

  /* ── 6. Video ── */
  .igd-video-wrap { position: relative; aspect-ratio: 16/9; border-radius: var(--radius-lg); overflow: hidden; background: var(--color-neutral-900); cursor: pointer; }
  .igd-video-wrap:hover .igd-play-btn { transform: translate(-50%,-50%) scale(1.08); }
  .igd-play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 56px; height: 56px; background: var(--color-lime-400); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform 200ms var(--ease-out); }
  .igd-video-caption { font-family: var(--font-serif); font-size: 0.875rem; font-style: italic; color: var(--color-text-tertiary); margin-top: 10px; text-align: center; }

  /* ── 7. FAQ ── */
  .igd-faq { display: flex; flex-direction: column; }
  .igd-faq-item { border-bottom: 1px solid var(--color-border-default); }
  .igd-faq-item:first-child { border-top: 1px solid var(--color-border-default); }
  .igd-faq-trigger { width: 100%; display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 18px 0; background: none; border: none; cursor: pointer; text-align: left; }
  .igd-faq-trigger:hover .igd-faq-q { color: var(--color-lime-600); }
  .igd-faq-q { font-family: var(--font-display); font-size: 1rem; font-weight: 600; color: var(--color-text-primary); line-height: 1.3; transition: color 150ms; flex: 1; }
  .igd-faq-chevron { flex-shrink: 0; color: var(--color-text-tertiary); transition: transform 250ms var(--ease-out); }
  .igd-faq-chevron.open { transform: rotate(180deg); }
  .igd-faq-body { font-family: var(--font-sans); font-size: 0.9375rem; line-height: 1.7; color: var(--color-text-secondary); overflow: hidden; transition: max-height 300ms var(--ease-out), opacity 250ms; }
  .igd-faq-body-inner { padding: 0 0 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ── Header (simplified) ─────────────────────────────────── */
function Header() {
  const now = new Date().toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
  return (
    <header style={{ background:'var(--color-neutral-900)', borderBottom:'1px solid rgba(255,255,255,0.07)' }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr auto 1fr', alignItems:'center', padding:'0 40px', height:'60px' }}>
        <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-neutral-500)', fontVariantNumeric:'tabular-nums' }}>{now}</span>
        <a href="Homepage.html" style={{ fontFamily:'var(--font-display)', fontSize:'1.4375rem', fontWeight:700, letterSpacing:'-0.03em', color:'#fff', textDecoration:'none' }}>
          <span style={{ color:'var(--color-lime-400)' }}>In</span>Goedendoen<sup style={{ fontSize:'0.45em', color:'var(--color-lime-400)', marginLeft:'2px' }}>®</sup>
        </a>
        <div style={{ display:'flex', justifyContent:'flex-end', gap:'10px' }}>
          <button style={{ background:'var(--color-lime-400)', color:'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:700, fontSize:'0.8125rem', border:'none', borderRadius:'9999px', padding:'6px 17px', cursor:'pointer' }}>Nieuwsbrief</button>
        </div>
      </div>
    </header>
  );
}

/* ══════════════════════════════════════════════════════════
   BLOK COMPONENTEN
══════════════════════════════════════════════════════════ */

/* ── 1. CTA blok ─────────────────────────────────────────── */
function CTABlok({ title, body, btnPrimary, btnSecondary }) {
  const [hovP, setHovP] = React.useState(false);
  const [hovS, setHovS] = React.useState(false);
  return (
    <div className="igd-cta">
      <div style={{ maxWidth:'520px' }}>
        <h3 style={{ fontFamily:'var(--font-display)', fontSize:'1.375rem', fontWeight:700, color:'#fff', lineHeight:1.2, letterSpacing:'-0.02em', marginBottom:'10px', textWrap:'balance' }}>{title}</h3>
        <p style={{ fontFamily:'var(--font-sans)', fontSize:'0.9375rem', color:'rgba(255,255,255,0.55)', lineHeight:1.65, marginBottom:'24px' }}>{body}</p>
        <div style={{ display:'flex', gap:'10px', flexWrap:'wrap' }}>
          <button onMouseEnter={()=>setHovP(true)} onMouseLeave={()=>setHovP(false)}
            style={{ background: hovP?'#bde200':'var(--color-lime-400)', color:'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:700, fontSize:'0.875rem', border:'none', borderRadius:'9999px', padding:'11px 22px', cursor:'pointer', transition:'background 150ms', whiteSpace:'nowrap' }}>
            {btnPrimary}
          </button>
          <button onMouseEnter={()=>setHovS(true)} onMouseLeave={()=>setHovS(false)}
            style={{ background:'transparent', color: hovS?'#fff':'rgba(255,255,255,0.7)', fontFamily:'var(--font-sans)', fontWeight:500, fontSize:'0.875rem', border:'1.5px solid rgba(255,255,255,0.2)', borderRadius:'9999px', padding:'11px 22px', cursor:'pointer', transition:'color 150ms, border-color 150ms', borderColor: hovS?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.2)', whiteSpace:'nowrap' }}>
            {btnSecondary}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── 1b. CTA blok met afbeelding ───────────────────────── */
function CTABlokAfbeelding({ title, body, btnPrimary, btnSecondary, img }) {
  const [hovP, setHovP] = React.useState(false);
  const [hovS, setHovS] = React.useState(false);
  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', borderRadius:'var(--radius-lg)', overflow:'hidden', minHeight:'240px' }}>
      {/* Left: text */}
      <div style={{ background:'var(--color-neutral-900)', padding:'40px', display:'flex', flexDirection:'column', justifyContent:'center' }}>
        <div style={{ display:'inline-block', background:'var(--color-lime-400)', color:'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:800, fontSize:'0.5rem', letterSpacing:'0.18em', textTransform:'uppercase', borderRadius:'9999px', padding:'3px 12px', marginBottom:'16px', alignSelf:'flex-start' }}>Tip van de redactie</div>
        <h3 style={{ fontFamily:'var(--font-display)', fontSize:'1.375rem', fontWeight:700, color:'#fff', lineHeight:1.2, letterSpacing:'-0.02em', marginBottom:'10px', textWrap:'balance' }}>{title}</h3>
        <p style={{ fontFamily:'var(--font-sans)', fontSize:'0.875rem', color:'rgba(255,255,255,0.55)', lineHeight:1.65, marginBottom:'24px' }}>{body}</p>
        <div style={{ display:'flex', gap:'10px', flexWrap:'wrap' }}>
          <button onMouseEnter={()=>setHovP(true)} onMouseLeave={()=>setHovP(false)}
            style={{ background: hovP?'#bde200':'var(--color-lime-400)', color:'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:700, fontSize:'0.875rem', border:'none', borderRadius:'9999px', padding:'11px 22px', cursor:'pointer', transition:'background 150ms', whiteSpace:'nowrap' }}>
            {btnPrimary}
          </button>
          <button onMouseEnter={()=>setHovS(true)} onMouseLeave={()=>setHovS(false)}
            style={{ background:'transparent', color: hovS?'#fff':'rgba(255,255,255,0.65)', fontFamily:'var(--font-sans)', fontWeight:500, fontSize:'0.875rem', border:'1.5px solid rgba(255,255,255,0.2)', borderRadius:'9999px', padding:'11px 22px', cursor:'pointer', transition:'color 150ms, border-color 150ms', borderColor: hovS?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.2)', whiteSpace:'nowrap' }}>
            {btnSecondary}
          </button>
        </div>
      </div>
      {/* Right: image */}
      <div style={{ position:'relative', overflow:'hidden' }}>
        <img src={img} alt="" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to right, rgba(35,35,35,0.35) 0%, transparent 40%)' }} />
      </div>
    </div>
  );
}

/* ── 2. Quote ────────────────────────────────────────────── */
function QuoteBlok({ text, attribution }) {
  return (
    <div className="igd-quote">
      <blockquote>"{text}"</blockquote>
      {attribution && <cite>{attribution}</cite>}
    </div>
  );
}

/* ── 3. Notice ───────────────────────────────────────────── */
function NoticeBlok({ variant='info', title, body }) {
  const isInfo = variant === 'info';
  const iconColor = isInfo ? 'var(--color-blue-500)' : 'var(--color-pink-500)';
  const icon = isInfo
    ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={iconColor} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={iconColor} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
  return (
    <div className={`igd-notice ${isInfo ? 'igd-notice-info' : 'igd-notice-warn'}`}>
      <div className={`igd-notice-icon ${isInfo ? 'igd-notice-icon-info' : 'igd-notice-icon-warn'}`}>{icon}</div>
      <div>
        <div className={`igd-notice-title ${isInfo ? 'igd-notice-title-info' : 'igd-notice-title-warn'}`}>{title}</div>
        <div className="igd-notice-body">{body}</div>
      </div>
    </div>
  );
}

/* ── 4. Genummerde lijst ─────────────────────────────────── */
function GenummerdeListBlok({ items }) {
  return (
    <div className="igd-numlist">
      {items.map((item, i) => (
        <div key={i} className="igd-numlist-item">
          <span className="igd-numlist-nr">{String(i+1).padStart(2,'0')}</span>
          <span className="igd-numlist-text" dangerouslySetInnerHTML={{ __html: item }} />
        </div>
      ))}
    </div>
  );
}

/* ── 5. Opsomming ────────────────────────────────────────── */
function OpsommingBlok({ items }) {
  return (
    <div className="igd-bulletlist">
      {items.map((item, i) => (
        <div key={i} className="igd-bulletlist-item">
          <div className="igd-bullet" />
          <span className="igd-bulletlist-text" dangerouslySetInnerHTML={{ __html: item }} />
        </div>
      ))}
    </div>
  );
}

/* ── 6. Video ────────────────────────────────────────────── */
function VideoBlok({ thumb, caption }) {
  const [playing, setPlaying] = React.useState(false);
  return (
    <div>
      <div className="igd-video-wrap" onClick={() => setPlaying(true)}>
        {thumb && !playing && <img src={thumb} alt="Video thumbnail" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />}
        {playing
          ? <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', background:'#000', color:'rgba(255,255,255,0.4)', fontFamily:'var(--font-sans)', fontSize:'0.9375rem' }}>▶ Video speelt hier af (YouTube / Vimeo insluiting)</div>
          : <>
              <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.22)' }} />
              <div className="igd-play-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--color-neutral-900)"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              </div>
            </>
        }
      </div>
      {caption && <p className="igd-video-caption">{caption}</p>}
    </div>
  );
}

/* ── 7. FAQ accordeon ────────────────────────────────────── */
function FaqBlok({ items }) {
  const [open, setOpen] = React.useState({});
  function toggle(i) { setOpen(o => ({ ...o, [i]: !o[i] })); }
  return (
    <div className="igd-faq">
      {items.map((item, i) => (
        <div key={i} className="igd-faq-item">
          <button className="igd-faq-trigger" onClick={() => toggle(i)}>
            <span className="igd-faq-q">{item.q}</span>
            <svg className={`igd-faq-chevron${open[i]?' open':''}`} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <div className="igd-faq-body" style={{ maxHeight: open[i] ? '400px' : '0', opacity: open[i] ? 1 : 0 }}>
            <div className="igd-faq-body-inner">{item.a}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   BLOK WRAPPER + APP
══════════════════════════════════════════════════════════ */

function BlokSection({ nr, name, desc, children }) {
  return (
    <div className="blok-section">
      <div className="blok-meta">
        <span className="blok-nr">{nr}</span>
        <strong className="blok-name">{name}</strong>
      </div>
      <p className="blok-desc">{desc}</p>
      <div className="blok-preview">{children}</div>
    </div>
  );
}

function App() {
  return (
    <div style={{ display:'flex', flexDirection:'column', minHeight:'100vh' }}>
      <Header />

      <main style={{ flex:1 }}>
        <div style={{ maxWidth:'820px', margin:'0 auto', padding:'48px 40px 80px' }}>

          {/* Page header */}
          <div style={{ marginBottom:'48px', paddingBottom:'32px', borderBottom:'1px solid var(--color-border-default)' }}>
            <div style={{ display:'inline-flex', alignItems:'center', gap:'6px', background:'var(--color-neutral-100)', border:'1px solid var(--color-border-default)', borderRadius:'9999px', padding:'4px 12px', marginBottom:'20px' }}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-tertiary)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.75rem', color:'var(--color-text-tertiary)', fontWeight:500 }}>Intern · Niet geïndexeerd</span>
            </div>
            <h1 style={{ fontFamily:'var(--font-display)', fontSize:'2.25rem', fontWeight:700, letterSpacing:'-0.025em', lineHeight:1.15, marginBottom:'12px' }}>Blog bouwstenen</h1>
            <p style={{ fontFamily:'var(--font-sans)', fontSize:'1rem', lineHeight:1.68, color:'var(--color-text-secondary)', maxWidth:'540px' }}>
              Alle herbruikbare blokken die beschikbaar zijn voor redactionele artikelen op InGoedendoen. Gebruik als referentie bij het opstellen van nieuwe content.
            </p>
          </div>

          {/* ── 01 CTA blok ── */}
          <BlokSection nr="01" name="CTA blok" desc="Conversieblok binnen een artikel. Donker vlak met primaire lime-knop en optionele secundaire knop.">
            <CTABlok
              title="Wil je meer tips voor een gezonder leven?"
              body="Schrijf je in voor onze nieuwsbrief en ontvang wekelijks de beste gezondheidsartikelen — zonder spam, zonder fratsen."
              btnPrimary="Aanmelden voor nieuwsbrief"
              btnSecondary="Bekijk alle artikelen"
            />
          </BlokSection>

          {/* ── 01b CTA met afbeelding ── */}
          <BlokSection nr="01b" name="CTA blok — met afbeelding" desc="Variant met een sfeerbeeld rechts. Gebruik voor thematische CTAs waarbij een visuele context het bericht versterkt.">
            <CTABlokAfbeelding
              title="Ontdek wat gezond eten voor jou kan betekenen"
              body="Van snelle lunches tot uitgebreide voedingsgidsen — alles op één plek, toegankelijk en zonder oordeel."
              btnPrimary="Bekijk voedingsartikelen"
              btnSecondary="Meer over ons"
              img="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=800&q=80"
            />
          </BlokSection>

          {/* ── 02 Quote ── */}
          <BlokSection nr="02" name="Quote" desc="Pull-quote in STIX Two Text serif met een 3px lime-rule links. Voor opvallende citaten of uitspraken.">
            <QuoteBlok
              text="Gezond leven hoeft niet ingewikkeld te zijn. Kleine aanpassingen maken het grote verschil — elke dag opnieuw."
              attribution="Sophie van Dam — Voedingsdeskundige, InGoedendoen"
            />
          </BlokSection>

          {/* ── 03 Notice ── */}
          <BlokSection nr="03" name="Notice" desc="Aandachtsblok in twee varianten: info (blauw) en let op (roze). Gebruik spaarzaam voor echt relevante aanvullingen.">
            <div style={{ display:'flex', flexDirection:'column', gap:'12px' }}>
              <NoticeBlok
                variant="info"
                title="Goed om te weten"
                body="Een dagelijkse wandeling van 20 minuten is al voldoende om een merkbaar effect op je bloedsuikerspiegel te hebben. Je hoeft geen intensieve sporter te zijn."
              />
              <NoticeBlok
                variant="warn"
                title="Let op"
                body="Bij twijfel over voedingssupplementen of medische klachten: raadpleeg altijd een arts of diëtist. Dit artikel vervangt geen professioneel advies."
              />
            </div>
          </BlokSection>

          {/* ── 04 Genummerde lijst ── */}
