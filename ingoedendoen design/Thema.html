<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: var(--font-sans); background: var(--color-surface-page); color: var(--color-text-primary); -webkit-font-smoothing: antialiased; }
  #root { display: flex; flex-direction: column; min-height: 100%; }
  img { display: block; max-width: 100%; }

  @keyframes igdTicker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .igd-ticker-track { display: flex; animation: igdTicker 36s linear infinite; }
  .igd-ticker-track:hover { animation-play-state: paused; }

  .igd-section-label {
    font-family: var(--font-sans); font-size: 0.625rem; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-text-primary);
    display: inline-block; padding-bottom: 8px; border-bottom: 2px solid var(--color-lime-400);
  }
  .igd-section-label-light {
    font-family: var(--font-sans); font-size: 0.625rem; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase; color: #fff;
    display: inline-block; padding-bottom: 8px; border-bottom: 2px solid var(--color-lime-400);
  }

  /* Carousel arrow btn */
  .carousel-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: rgba(255,255,255,0.7); transition: background 150ms, border-color 150ms, color 150ms;
  }
  .carousel-btn:hover { background: var(--color-lime-400); border-color: var(--color-lime-400); color: var(--color-neutral-900); }
  .carousel-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

  /* Article list item */
  .igd-art-item { display: flex; gap: 20px; align-items: flex-start; padding: 20px 0; border-bottom: 1px solid var(--color-border-default); cursor: pointer; text-decoration: none; color: inherit; }
  .igd-art-item:last-child { border-bottom: none; }
  .igd-art-item:hover .igd-art-item-title { color: var(--color-lime-600); }
  .igd-art-item:hover .igd-art-item-thumb img { transform: scale(1.04); }
  .igd-art-item-thumb { width: 180px; height: 128px; border-radius: var(--radius-md); overflow: hidden; flex-shrink: 0; }
  .igd-art-item-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 360ms; }
  .igd-art-item-title { font-family: var(--font-display); font-size: 1.125rem; font-weight: 700; line-height: 1.25; letter-spacing: -0.015em; color: var(--color-text-primary); transition: color 150ms; text-wrap: balance; margin: 5px 0 8px; }
  .igd-art-item-excerpt { font-family: var(--font-sans); font-size: 0.875rem; line-height: 1.62; color: var(--color-text-secondary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; }

  /* Sidebar compact item */
  .igd-sb-item { padding: 12px 0; border-bottom: 1px solid var(--color-border-default); cursor: pointer; }
  .igd-sb-item:last-child { border-bottom: none; }
  .igd-sb-item:hover .igd-sb-title { color: var(--color-lime-600); }
  .igd-sb-title { font-family: var(--font-display); font-size: 0.875rem; font-weight: 600; line-height: 1.3; color: var(--color-text-primary); transition: color 150ms; text-wrap: balance; margin-top: 4px; }
</style>
</head>

  { id:2, category:'voeding', title:'De beste voeding voor je darmflora', excerpt:'Je darmen zijn je tweede brein. Wat je eet bepaalt hoe je je voelt — en deze tien voedingsmiddelen maken het verschil.', author:'Tim Hendriks', date:'7 jun 2026', readTime:7, img:'https://images.unsplash.com/photo-1498837167922-ddd27525d352?w=600&q=75' },

/* ── Header ─────────────────────────────────────────────── */
function Header() {
  const [navHov, setNavHov] = React.useState(null);
  const links = ['Voeding','Beweging','Mindset','Recepten'];
  const now = new Date().toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });

    <header style={{ background:'var(--color-neutral-900)', position:'sticky', top:0, zIndex:100 }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr auto 1fr', alignItems:'center', padding:'0 40px', height:'60px', borderBottom:'1px solid rgba(255,255,255,0.07)' }}>
        <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-neutral-500)', letterSpacing:'0.04em', fontVariantNumeric:'tabular-nums' }}>{now}</span>
        <a href="Homepage.html" style={{ fontFamily:'var(--font-display)', fontSize:'1.4375rem', fontWeight:700, letterSpacing:'-0.03em', color:'#fff', textDecoration:'none' }}>

        <div style={{ display:'flex', alignItems:'center', gap:'10px', justifyContent:'flex-end' }}>
          <button style={{ background:'none', border:'none', cursor:'pointer', color:'var(--color-neutral-400)', padding:'6px', display:'flex' }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <button style={{ background:'none', border:'1.5px solid rgba(255,255,255,0.18)', color:'rgba(255,255,255,0.75)', fontFamily:'var(--font-sans)', fontWeight:500, fontSize:'0.8125rem', borderRadius:'9999px', padding:'5px 15px', cursor:'pointer' }}>Inloggen</button>
          <button style={{ background:'var(--color-lime-400)', color:'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:700, fontSize:'0.8125rem', border:'none', borderRadius:'9999px', padding:'6px 17px', cursor:'pointer' }}>Nieuwsbrief</button>
        </div>
      </div>
      <div style={{ display:'flex', alignItems:'stretch', height:'38px' }}>
        <div style={{ background:'var(--color-lime-400)', color:'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:800, fontSize:'0.5625rem', letterSpacing:'0.18em', textTransform:'uppercase', display:'flex', alignItems:'center', padding:'0 14px', flexShrink:0 }}>Nieuws</div>
        <div style={{ flex:1, overflow:'hidden', display:'flex', alignItems:'center', borderRight:'1px solid rgba(255,255,255,0.07)' }}>
          <div className="igd-ticker-track">
            {[...TICKER,...TICKER].map((t,i) => (
              <span key={i} style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-neutral-400)', whiteSpace:'nowrap', padding:'0 28px' }}>

/* ── Carousel ────────────────────────────────────────────── */
function Carousel({ items }) {
  const [idx, setIdx] = React.useState(0);
  const VISIBLE = 2.2;
  const max = items.length - Math.floor(VISIBLE);

  return (
    <div style={{ background:'var(--color-neutral-900)', padding:'32px 40px 0' }}>
      <div style={{ maxWidth:'1280px', margin:'0 auto' }}>
        {/* Overflow window */}
        <div style={{ overflow:'hidden', borderRadius:'var(--radius-lg)' }}>
          <div style={{ display:'flex', gap:'12px', transition:'transform 420ms cubic-bezier(0.16,1,0.3,1)', transform:`translateX(calc(-${idx} * (${100/VISIBLE}% + ${12/VISIBLE}px)))` }}>
            {items.map(item => (
              <div key={item.id} style={{ position:'relative', minWidth:`calc(${100/VISIBLE}% - ${(12*(VISIBLE-1))/VISIBLE}px)`, height:'240px', borderRadius:'var(--radius-lg)', overflow:'hidden', cursor:'pointer', flexShrink:0 }}>
                <img src={item.img} alt={item.title} style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
                <div style={{ position:'absolute', inset:0, background:'linear-gradient(to top, rgba(10,10,10,0.88) 0%, rgba(10,10,10,0.3) 55%, transparent 100%)' }} />
                <div style={{ position:'absolute', inset:0, padding:'24px', display:'flex', flexDirection:'column', justifyContent:'flex-end' }}>
                  <div style={{ marginBottom:'10px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'12px' }}>
                      <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.5625rem', fontWeight:700, letterSpacing:'0.15em', textTransform:'uppercase', color:'var(--color-lime-400)' }}>{item.category}</span>
                      <span style={{ color:'rgba(255,255,255,0.3)', fontSize:'0.625rem' }}>·</span>
                      <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.75rem', color:'rgba(255,255,255,0.5)' }}>{item.readTime} min lezen</span>
                    </div>
                    <h3 style={{ fontFamily:'var(--font-display)', fontSize:'1.25rem', fontWeight:700, color:'#fff', lineHeight:1.2, letterSpacing:'-0.02em', marginBottom:'8px', textWrap:'balance' }}>{item.title}</h3>
                    <p style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'rgba(255,255,255,0.6)', lineHeight:1.55, display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden' }}>{item.excerpt}</p>
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:'6px', borderTop:'1px solid rgba(255,255,255,0.12)', paddingTop:'12px' }}>
                    <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.75rem', color:'rgba(255,255,255,0.5)' }}>{item.author}</span>
                    <span style={{ color:'rgba(255,255,255,0.25)' }}>·</span>
                    <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.75rem', color:'rgba(255,255,255,0.4)' }}>{item.date}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Navigation arrows */}
        <div style={{ display:'flex', alignItems:'center', gap:'8px', justifyContent:'flex-end', padding:'14px 0 0' }}>
          <button className="carousel-btn" disabled={idx===0} onClick={()=>setIdx(i=>Math.max(0,i-1))}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button className="carousel-btn" disabled={idx>=max} onClick={()=>setIdx(i=>Math.min(max,i+1))}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Footer ─────────────────────────────────────────────── */

      <p style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-text-tertiary)' }}>© 2026 InGoedendoen · Voor een gezond, fit en vrolijk leven.</p>
      <div style={{ display:'flex', gap:'20px' }}>
        {['Privacy','Contact','Over ons'].map(l => (

    </footer>

}

                  Alle artikelen
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </a>
              </div>

              {ARTICLES.map(art => (
                <a key={art.id} href="Blog Detail.html" className="igd-art-item">
                  <div className="igd-art-item-thumb"><img src={art.img} alt={art.title} /></div>
                  <div style={{ flex:1 }}>
                    <div style={{ display:'flex', gap:'5px', alignItems:'center', marginBottom:'2px' }}>
                      <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.5625rem', fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', color:'var(--color-lime-400)' }}>Artikel</span>

                    <div className="igd-art-item-excerpt" style={{ color:'rgba(255,255,255,0.5)' }}>{art.excerpt}</div>
                    <div style={{ fontFamily:'var(--font-sans)', fontSize:'0.75rem', color:'rgba(255,255,255,0.35)', display:'flex', gap:'6px', alignItems:'center' }}>
                      <span>{art.author}</span><span>·</span><span>{art.date}</span>
                    </div>
                  </div>
                </a>
              ))}
            </div>

            {/* ── Sidebar ── */}
            <div style={{ paddingLeft:'32px' }}>

              {/* Andere thema's */}
              <div style={{ marginBottom:'32px' }}>
                <div style={{ marginBottom:'16px' }}>
                  <span className="igd-section-label-light">Andere thema's</span>
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:'10px' }}>
                  {OTHER_THEMES.map(t => {
                    const [hov, setHov] = React.useState(false);
                    return (
                      <div key={t.id} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
                        style={{ position:'relative', height:'72px', borderRadius:'var(--radius-md)', overflow:'hidden', cursor:'pointer', transition:'transform 200ms', transform: hov?'translateY(-2px)':'none' }}>
                        <img src={t.img} alt={t.label} style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                        <div style={{ position:'absolute', inset:0, background: hov?'rgba(0,0,0,0.45)':'rgba(0,0,0,0.55)', transition:'background 150ms' }} />
                        <div style={{ position:'absolute', bottom:0, left:0, right:0, height:'3px', background:'var(--color-lime-400)', transform: hov?'scaleX(1)':'scaleX(0)', transition:'transform 200ms', transformOrigin:'left' }} />
                        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', padding:'0 14px' }}>
                          <span style={{ fontFamily:'var(--font-display)', fontSize:'1rem', fontWeight:700, color:'#fff', letterSpacing:'-0.01em' }}>{t.label}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Populair */}
              <div>
                <div style={{ marginBottom:'12px' }}>
                  <span className="igd-section-label-light">Populair</span>
                </div>
                {SIDEBAR_POP.map(a => (
                  <div key={a.id} className="igd-sb-item" style={{ borderBottomColor:'rgba(255,255,255,0.08)' }}>
                    <div style={{ fontFamily:'var(--font-sans)', fontSize:'0.5625rem', fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color: CAT_COLOR[a.category] }}>{a.category}</div>
                    <div className="igd-sb-title" style={{ color:'rgba(255,255,255,0.85)' }}>{a.title}</div>
                    <div style={{ fontFamily:'var(--font-sans)', fontSize:'0.75rem', color:'rgba(255,255,255,0.35)', marginTop:'3px' }}>{a.date} · {a.readTime} min</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </main>

      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
