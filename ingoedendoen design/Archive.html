<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alle artikelen — InGoedendoen</title>
<link rel="stylesheet" href="_ds/ingoedendoen-design-system-c7b6420c-4754-4083-b036-265964d0c5ff/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds/ingoedendoen-design-system-c7b6420c-4754-4083-b036-265964d0c5ff/_ds_bundle.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: var(--font-sans); background: var(--color-surface-page); color: var(--color-text-primary); -webkit-font-smoothing: antialiased; }
  #root { display: flex; flex-direction: column; min-height: 100%; }
  img { display: block; max-width: 100%; }

  @keyframes igdTicker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .igd-ticker-track { display: flex; animation: igdTicker 36s linear infinite; }
  .igd-ticker-track:hover { animation-play-state: paused; }

  .igd-section-label {
    font-family: var(--font-sans); font-size: 0.625rem; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-text-primary);
    display: inline-block; padding-bottom: 8px; border-bottom: 2px solid var(--color-lime-400);
  }

  .igd-art-row { display: flex; gap: 14px; align-items: flex-start; padding: 13px 0; border-bottom: 1px solid var(--color-border-default); cursor: pointer; }
  .igd-art-row:last-child { border-bottom: none; }
  .igd-art-row:hover .igd-art-title { color: var(--color-lime-600); }
  .igd-art-row:hover .igd-art-thumb img { transform: scale(1.06); }
  .igd-art-title { font-family: var(--font-display); font-size: 0.9375rem; font-weight: 600; line-height: 1.3; color: var(--color-text-primary); transition: color 150ms; text-wrap: balance; margin-top: 4px; }
  .igd-art-meta { font-family: var(--font-sans); font-size: 0.75rem; color: var(--color-text-tertiary); display: flex; gap: 5px; align-items: center; }
  .igd-art-thumb { width: 80px; height: 60px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .igd-art-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 320ms; }

  /* Filtered list (wide, with excerpt) */
  .igd-list-item { display: flex; gap: 20px; align-items: flex-start; padding: 18px 0; border-bottom: 1px solid var(--color-border-default); cursor: pointer; }
  .igd-list-item:hover .igd-list-title { color: var(--color-lime-600); }
  .igd-list-item:hover .igd-list-thumb img { transform: scale(1.04); }
  .igd-list-thumb { width: 160px; height: 110px; border-radius: var(--radius-md); overflow: hidden; flex-shrink: 0; }
  .igd-list-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 360ms; }
  .igd-list-title { font-family: var(--font-display); font-size: 1.0625rem; font-weight: 600; line-height: 1.3; color: var(--color-text-primary); transition: color 150ms; text-wrap: balance; margin: 5px 0 7px; }
  .igd-list-excerpt { font-family: var(--font-sans); font-size: 0.875rem; line-height: 1.6; color: var(--color-text-secondary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const CAT_COLOR = {
  voeding:'var(--color-lime-600)', beweging:'var(--color-blue-500)',

const TICKER = [
  'Wandelen na het eten verlaagt je bloedsuiker aanzienlijk',

  'Mediterraan dieet vermindert ontstekingen — nieuw onderzoek bevestigt',
  'Mindfulness in 10 minuten: zo begin je vandaag nog',
  'De beste oefeningen voor een sterke, pijnvrije rug',
];

const ARTICLES = [
  /* Voeding */
  { id:1,  category:'voeding',  title:'20 minuten wandelen verandert meer dan je denkt',        excerpt:'Wist je dat een korte wandeling je bloedsuiker stabiliseert én je humeur verbetert?',      date:'11 jun', readTime:5, img:'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400&q=75' },
  { id:2,  category:'voeding',  title:'De beste voeding voor je darmflora',                     excerpt:'Je darmen zijn je tweede brein. Wat je eet bepaalt hoe je je voelt.',                        date:'7 jun',  readTime:7, img:'https://images.unsplash.com/photo-1498837167922-ddd27525d352?w=400&q=75' },
  { id:3,  category:'voeding',  title:'Zo eet je meer groenten zonder het te merken',           excerpt:'Slimme manieren om meer vezels en vitamines binnen te krijgen zonder discipline.',             date:'5 jun',  readTime:4, img:'https://images.unsplash.com/photo-1505576399279-565b52d4ac71?w=400&q=75' },
  { id:4,  category:'voeding',  title:'Eiwitten: hoeveel heb je echt nodig?',                  excerpt:'De aanbevolen hoeveelheid en de beste bronnen — simpel uitgelegd.',                          date:'3 jun',  readTime:5, img:'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=75' },
  { id:5,  category:'voeding',  title:'Waarom je ontbijt niet mag overslaan',                  excerpt:'Ochtendeten beïnvloedt je energie, concentratie én stofwisseling de rest van de dag.',       date:'1 jun',  readTime:4, img:'https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=400&q=75' },
  /* Beweging */
  { id:6,  category:'beweging', title:'Zo maak je van elke dag een beweegdag',                  excerpt:'Klein beginnen werkt beter dan grote plannen die je nooit volhoudt.',                        date:'10 jun', readTime:4, img:'https://images.unsplash.com/photo-1538805060514-97d9cc17730c?w=400&q=75' },
  { id:7,  category:'beweging', title:'Stretching voor beginners: 10 minuten per dag',          excerpt:'Je hoeft geen yogi te zijn om van stretching te profiteren.',                                 date:'4 jun',  readTime:4, img:'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=400&q=75' },
  { id:8,  category:'beweging', title:'Wandelen vs hardlopen: wat past bij jou?',               excerpt:'Beide hebben voordelen. Wij helpen je kiezen op basis van je doel en niveau.',               date:'2 jun',  readTime:5, img:'https://images.unsplash.com/photo-1490914327627-9fe8d52f4d90?w=400&q=75' },
  { id:9,  category:'beweging', title:'Krachttraining voor vrouwen: de feiten',                 excerpt:'Nee, je wordt er niet massief van. Wél sterker, strakker en energieker.',                   date:'30 mei', readTime:6, img:'https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=400&q=75' },
  { id:10, category:'beweging', title:'Fietsen naar je werk: 5 bewezen voordelen',              excerpt:'Meer dan alleen beweging — fietsen verbetert je mentale gezondheid en productiviteit.',      date:'28 mei', readTime:3, img:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&q=75' },
  /* Mindset */
  { id:11, category:'mindset',  title:'Waarom je brein rust nodig heeft',                       excerpt:'Altijd maar bezig zijn is geen deugd. Je brein verwerkt informatie juist tijdens stilte.',   date:'8 jun',  readTime:6, img:'https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?w=400&q=75' },
  { id:12, category:'mindset',  title:'Stress verminderen in 5 stappen',                        excerpt:'Praktische technieken die je direct kunt toepassen, zonder meditatie-app.',                   date:'6 jun',  readTime:5, img:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&q=75' },
  { id:13, category:'mindset',  title:'Slaap beter met deze avondroutine',                      excerpt:'Wat je doet in het uur voor je slaapt bepaalt de kwaliteit van je nacht.',                   date:'4 jun',  readTime:4, img:'https://images.unsplash.com/photo-1455619452474-d2be8b1e70cd?w=400&q=75' },
  { id:14, category:'mindset',  title:'Dankbaarheid oefenen: zo begin je vandaag',              excerpt:'Drie minuten per dag. Dat is alles wat je nodig hebt om je perspectief te verschuiven.',      date:'2 jun',  readTime:3, img:'https://images.unsplash.com/photo-1474418397713-7ede21d49118?w=400&q=75' },
  { id:15, category:'mindset',  title:'Een weekend zonder scherm: wat het doet',                excerpt:'Wij probeerden een digitale detox. Dit zijn onze eerlijke bevindingen.',                      date:'29 mei', readTime:7, img:'https://images.unsplash.com/photo-1484627147104-f5197bcd6651?w=400&q=75' },
  /* Recepten */
  { id:16, category:'recepten', title:'Havermout drie manieren — van saai naar subliem',        excerpt:'Met de juiste toppings maak je er een ontbijt van om naar uit te kijken.',                   date:'9 jun',  readTime:3, img:'https://images.unsplash.com/photo-1517673132405-a56a62b18caf?w=400&q=75' },
  { id:17, category:'recepten', title:'5 gezonde lunches die je de hele dag volhouden',         excerpt:'Snel te maken, lekker mee te nemen en vol met goede voedingsstoffen.',                       date:'7 jun',  readTime:4, img:'https://images.unsplash.com/photo-1547592166-23ac45744acd?w=400&q=75' },
  { id:18, category:'recepten', title:'Snelle bowls met groenten en granen',                    excerpt:'Een voedzame maaltijd in 20 minuten — varieer eindeloos met de seizoenen.',                  date:'5 jun',  readTime:3, img:'https://images.unsplash.com/photo-1512058564366-18510be2db19?w=400&q=75' },
  { id:19, category:'recepten', title:'Bananenbrood zonder toegevoegde suiker',                 excerpt:'Zoet, vochtig en toch goed voor je. Ons favoriete recept met maar 5 ingrediënten.',          date:'3 jun',  readTime:3, img:'https://images.unsplash.com/photo-1509440159596-0249088772ff?w=400&q=75' },
  { id:20, category:'recepten', title:'Proteïne-rijke salades voor de zomer',                  excerpt:'Verzadigend genoeg voor de lunch, fris genoeg voor de warmste dagen.',                       date:'1 jun',  readTime:4, img:'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400&q=75' },
];

const CATS = ['Alle', 'Voeding', 'Beweging', 'Mindset', 'Recepten'];

/* ── Header ─────────────────────────────────────────────── */
function Header() {
  const [navHov, setNavHov] = React.useState(null);
  const links = ['Voeding', 'Beweging', 'Mindset', 'Recepten'];
  const now = new Date().toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
  return (
    <header style={{ background:'var(--color-neutral-900)', position:'sticky', top:0, zIndex:100 }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr auto 1fr', alignItems:'center', padding:'0 40px', height:'60px', borderBottom:'1px solid rgba(255,255,255,0.07)' }}>
        <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-neutral-500)', letterSpacing:'0.04em', fontVariantNumeric:'tabular-nums' }}>{now}</span>
        <a href="Homepage.html" style={{ fontFamily:'var(--font-display)', fontSize:'1.4375rem', fontWeight:700, letterSpacing:'-0.03em', color:'#fff', textDecoration:'none' }}>
          <span style={{ color:'var(--color-lime-400)' }}>In</span>Goedendoen<sup style={{ fontSize:'0.45em', color:'var(--color-lime-400)', marginLeft:'2px' }}>®</sup>
        </a>
        <div style={{ display:'flex', alignItems:'center', gap:'10px', justifyContent:'flex-end' }}>
          <button style={{ background:'none', border:'none', cursor:'pointer', color:'var(--color-neutral-400)', padding:'6px', display:'flex' }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <button style={{ background:'none', border:'1.5px solid rgba(255,255,255,0.18)', color:'rgba(255,255,255,0.75)', fontFamily:'var(--font-sans)', fontWeight:500, fontSize:'0.8125rem', borderRadius:'9999px', padding:'5px 15px', cursor:'pointer' }}>Inloggen</button>
          <button style={{ background:'var(--color-lime-400)', color:'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:700, fontSize:'0.8125rem', border:'none', borderRadius:'9999px', padding:'6px 17px', cursor:'pointer' }}>Nieuwsbrief</button>
        </div>
      </div>
      <div style={{ display:'flex', alignItems:'stretch', height:'38px' }}>
        <div style={{ background:'var(--color-lime-400)', color:'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:800, fontSize:'0.5625rem', letterSpacing:'0.18em', textTransform:'uppercase', display:'flex', alignItems:'center', padding:'0 14px', flexShrink:0 }}>Nieuws</div>
        <div style={{ flex:1, overflow:'hidden', display:'flex', alignItems:'center', borderRight:'1px solid rgba(255,255,255,0.07)' }}>
          <div className="igd-ticker-track">
            {[...TICKER,...TICKER].map((t,i) => (
              <span key={i} style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-neutral-400)', whiteSpace:'nowrap', padding:'0 28px' }}>
                {t}<span style={{ color:'var(--color-lime-400)', marginLeft:'28px' }}>★</span>
              </span>
            ))}
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'stretch', flexShrink:0 }}>
          {links.map(l => (
            <a key={l} href="#" onClick={e=>e.preventDefault()} onMouseEnter={()=>setNavHov(l)} onMouseLeave={()=>setNavHov(null)}
              style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', fontWeight:500, color: navHov===l?'#fff':'var(--color-neutral-400)', padding:'0 14px', display:'flex', alignItems:'center', textDecoration:'none', transition:'color 150ms', borderLeft:'1px solid rgba(255,255,255,0.07)' }}>{l}</a>
          ))}
        </div>
      </div>
    </header>
  );
}

/* ── Compact article row (inside category section) ──────── */
function ArtRow({ art }) {
  return (
    <a href="Blog Detail.html" className="igd-art-row" style={{ textDecoration:'none', color:'inherit' }}>
      <div className="igd-art-thumb"><img src={art.img} alt={art.title} /></div>
      <div style={{ flex:1 }}>
        <div className="igd-art-meta">
          <span style={{ color: CAT_COLOR[art.category], fontWeight:700, fontSize:'0.5625rem', letterSpacing:'0.1em', textTransform:'uppercase' }}>{art.category}</span>
          <span>·</span><span>{art.date}</span><span>·</span><span>{art.readTime} min</span>
        </div>
        <div className="igd-art-title">{art.title}</div>
      </div>
    </a>
  );
}

/* ── Wide list item (filtered view) ─────────────────────── */
function ListItem({ art }) {
  return (
    <a href="Blog Detail.html" className="igd-list-item" style={{ textDecoration:'none', color:'inherit' }}>
      <div className="igd-list-thumb"><img src={art.img} alt={art.title} /></div>
      <div style={{ flex:1 }}>
        <div style={{ display:'flex', gap:'5px', alignItems:'center', marginBottom:'2px' }}>
          <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.5625rem', fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color: CAT_COLOR[art.category] }}>{art.category}</span>
          <span style={{ color:'var(--color-neutral-300)', fontSize:'0.625rem' }}>·</span>
          <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.75rem', color:'var(--color-text-tertiary)' }}>{art.date} · {art.readTime} min lezen</span>
        </div>
        <div className="igd-list-title">{art.title}</div>
        <div className="igd-list-excerpt">{art.excerpt}</div>
      </div>
    </a>
  );
}

/* ── Category section ────────────────────────────────────── */
function CatSection({ cat, arts }) {
  return (
    <div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:'16px' }}>
        <span className="igd-section-label">{cat}</span>
        <a href="#" onClick={e=>e.preventDefault()} style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', fontWeight:500, color:'var(--color-blue-500)', textDecoration:'none', display:'flex', alignItems:'center', gap:'3px', transition:'color 150ms' }}>
          Meer verhalen
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
      </div>
      {arts.map(a => <ArtRow key={a.id} art={a} />)}
    </div>
  );
}

/* ── Footer ─────────────────────────────────────────────── */
function Footer() {
  return (
    <footer style={{ borderTop:'1px solid var(--color-border-default)', padding:'28px 40px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:'16px', flexWrap:'wrap' }}>
      <div style={{ fontFamily:'var(--font-display)', fontSize:'1rem', fontWeight:700, letterSpacing:'-0.02em' }}>
        <span style={{ color:'var(--color-lime-400)' }}>In</span>Goedendoen
      </div>
      <p style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-text-tertiary)' }}>© 2026 InGoedendoen · Voor een gezond, fit en vrolijk leven.</p>
      <div style={{ display:'flex', gap:'20px' }}>
        {['Privacy','Contact','Over ons'].map(l => (
          <a key={l} href="#" onClick={e=>e.preventDefault()} style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-text-secondary)', textDecoration:'none' }}>{l}</a>
        ))}
      </div>
    </footer>
  );
}

/* ── App ─────────────────────────────────────────────────── */
function App() {
  const [active, setActive] = React.useState('Alle');
  const [search, setSearch] = React.useState('');

  const filtered = React.useMemo(() => {
    let list = active === 'Alle' ? ARTICLES : ARTICLES.filter(a => a.category === active.toLowerCase());
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(a => a.title.toLowerCase().includes(q) || a.category.toLowerCase().includes(q) || a.excerpt.toLowerCase().includes(q));
    }
    return list;
  }, [active, search]);

  const byCategory = React.useMemo(() => {
    const groups = {};
    ['Voeding','Beweging','Mindset','Recepten'].forEach(c => {
      groups[c] = ARTICLES.filter(a => a.category === c.toLowerCase()).slice(0, 5);
    });
    return groups;
  }, []);

  const showGrid = active === 'Alle' && !search.trim();

  return (
    <div style={{ display:'flex', flexDirection:'column', minHeight:'100vh' }}>
      <Header />

      {/* Page header */}
      <div style={{ borderBottom:'1px solid var(--color-border-default)' }}>
        <div style={{ maxWidth:'1280px', margin:'0 auto', padding:'28px 40px 0' }}>

          {/* Back + Title */}
          <div style={{ display:'flex', alignItems:'center', gap:'16px', marginBottom:'20px' }}>
            <a href="Homepage.html" style={{ display:'inline-flex', alignItems:'center', gap:'4px', fontFamily:'var(--font-sans)', fontSize:'0.8125rem', fontWeight:500, color:'var(--color-text-secondary)', textDecoration:'none' }}
              onMouseEnter={e=>e.currentTarget.style.color='var(--color-lime-600)'} onMouseLeave={e=>e.currentTarget.style.color='var(--color-text-secondary)'}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              Home
            </a>
            <span style={{ color:'var(--color-neutral-300)', fontSize:'0.75rem' }}>/</span>
            <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-text-tertiary)' }}>Alle artikelen</span>
          </div>

          <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', gap:'24px', flexWrap:'wrap', marginBottom:'20px' }}>
            <h1 style={{ fontFamily:'var(--font-display)', fontSize:'1.875rem', fontWeight:700, letterSpacing:'-0.025em', lineHeight:1 }}>Alle artikelen</h1>
            {/* Search */}
            <div style={{ display:'flex', alignItems:'center', gap:'8px', background:'var(--color-neutral-50)', border:'1.5px solid var(--color-border-default)', borderRadius:'9999px', padding:'7px 16px', minWidth:'240px', transition:'border-color 150ms' }}
              onFocus={e=>e.currentTarget.style.borderColor='var(--color-lime-400)'} onBlur={e=>e.currentTarget.style.borderColor='var(--color-border-default)'}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" style={{ color:'var(--color-text-tertiary)', flexShrink:0 }}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Zoek een artikel…"
                style={{ border:'none', background:'transparent', outline:'none', fontFamily:'var(--font-sans)', fontSize:'0.875rem', color:'var(--color-text-primary)', flex:1, minWidth:0 }} />
              {search && <button onClick={()=>setSearch('')} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--color-text-tertiary)', padding:0, fontSize:'0.75rem' }}>✕</button>}
            </div>
          </div>

          {/* Intro text block */}
          <div style={{ padding:'20px 0 4px', maxWidth:'680px' }}>
            <p style={{ fontFamily:'var(--font-sans)', fontSize:'0.9375rem', lineHeight:1.7, color:'var(--color-text-secondary)' }}>
              Alle artikelen over voeding, beweging, mindset en recepten. Van snelle praktische tips tot uitgebreide achtergrondstukken — geschreven door mensen die net zo veel plezier hebben in gezond leven als jij.
            </p>
          </div>

          {/* Category filter tabs */}
          <div style={{ display:'flex', gap:'0', borderTop:'1px solid var(--color-border-default)', marginTop:'4px' }}>
            {CATS.map(c => {
              const isActive = active === c;
              return (
                <button key={c} onClick={()=>{ setActive(c); setSearch(''); }}
                  style={{ fontFamily:'var(--font-sans)', fontSize:'0.875rem', fontWeight: isActive ? 700 : 500, color: isActive ? 'var(--color-text-primary)' : 'var(--color-text-tertiary)', background:'none', border:'none', borderBottom: isActive ? '2px solid var(--color-lime-400)' : '2px solid transparent', padding:'12px 20px', cursor:'pointer', transition:'color 150ms, border-color 150ms', marginBottom:'-1px' }}>
                  {c}
                </button>
              );
            })}
            <div style={{ flex:1 }} />
            <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-text-tertiary)', alignSelf:'center', paddingRight:'4px' }}>
              {filtered.length} {filtered.length === 1 ? 'artikel' : 'artikelen'}
            </span>
          </div>
        </div>
      </div>

      {/* Main content */}
      <main style={{ flex:1 }}>
        <div style={{ maxWidth:'1280px', margin:'0 auto', padding:'40px 40px 64px' }}>

          {showGrid ? (
            /* ── ALL view: 2-column section grid ── */
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1px 1fr', gap:'0' }}>
              {/* Left column */}
              <div style={{ paddingRight:'40px', display:'flex', flexDirection:'column', gap:'40px' }}>
                <CatSection cat="Voeding"  arts={byCategory['Voeding']} />
                <CatSection cat="Mindset"  arts={byCategory['Mindset']} />
              </div>
              {/* Vertical divider */}
              <div style={{ background:'var(--color-border-default)', margin:'0 0' }} />
              {/* Right column */}
              <div style={{ paddingLeft:'40px', display:'flex', flexDirection:'column', gap:'40px' }}>
                <CatSection cat="Beweging" arts={byCategory['Beweging']} />
                <CatSection cat="Recepten" arts={byCategory['Recepten']} />
              </div>
            </div>
          ) : (
            /* ── Filtered / search view: single wide list ── */
            <div style={{ maxWidth:'840px' }}>
              {filtered.length === 0 ? (
                <div style={{ textAlign:'center', padding:'80px 0', color:'var(--color-text-tertiary)', fontFamily:'var(--font-sans)', fontSize:'0.9375rem' }}>
                  Geen artikelen gevonden voor "<strong>{search}</strong>".
                </div>
              ) : (
                <>
                  {search && (
                    <p style={{ fontFamily:'var(--font-sans)', fontSize:'0.875rem', color:'var(--color-text-tertiary)', marginBottom:'24px' }}>
                      {filtered.length} {filtered.length===1?'resultaat':'resultaten'} voor "<strong style={{ color:'var(--color-text-primary)' }}>{search}</strong>"
                    </p>
                  )}
                  {filtered.map(a => <ListItem key={a.id} art={a} />)}
                </>
              )}
            </div>
          )}
        </div>
      </main>

      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
