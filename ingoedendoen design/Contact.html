<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — InGoedendoen</title>
<link rel="stylesheet" href="_ds/ingoedendoen-design-system-c7b6420c-4754-4083-b036-265964d0c5ff/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds/ingoedendoen-design-system-c7b6420c-4754-4083-b036-265964d0c5ff/_ds_bundle.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: var(--font-sans); background: var(--color-surface-page); color: var(--color-text-primary); -webkit-font-smoothing: antialiased; }
  #root { display: flex; flex-direction: column; min-height: 100%; }
  img { display: block; max-width: 100%; }

  @keyframes igdTicker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .igd-ticker-track { display: flex; animation: igdTicker 36s linear infinite; }
  .igd-ticker-track:hover { animation-play-state: paused; }

  /* Form fields */
  .igd-field { display: flex; flex-direction: column; gap: 6px; }
  .igd-label { font-family: var(--font-sans); font-size: 0.8125rem; font-weight: 600; color: var(--color-text-primary); }
  .igd-input {
    font-family: var(--font-sans); font-size: 0.9375rem; color: var(--color-text-primary);
    background: var(--color-surface-page); border: 2px solid var(--color-border-default);
    border-radius: var(--radius-md); padding: 11px 14px; outline: none; width: 100%;
    transition: border-color 160ms; resize: none;
  }
  .igd-input::placeholder { color: var(--color-text-tertiary); }
  .igd-input:focus { border-color: var(--color-lime-400); }
  .igd-input:focus-visible { box-shadow: none; }

  .igd-select {
    font-family: var(--font-sans); font-size: 0.9375rem; color: var(--color-text-primary);
    background: var(--color-surface-page); border: 2px solid var(--color-border-default);
    border-radius: var(--radius-md); padding: 11px 14px; outline: none; width: 100%;
    transition: border-color 160ms; appearance: none; cursor: pointer;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%235d5d5d' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat; background-position: right 14px center;
  }
  .igd-select:focus { border-color: var(--color-lime-400); }

  /* Contact info block */
  .igd-contact-block { padding: 20px 0; border-bottom: 1px solid var(--color-border-default); }
  .igd-contact-block:last-child { border-bottom: none; }

  /* Social icon btn */
  .igd-social { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--color-border-default); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--color-text-secondary); background: transparent; transition: border-color 150ms, color 150ms, background 150ms; text-decoration: none; }
  .igd-social:hover { border-color: var(--color-lime-400); color: var(--color-lime-600); background: var(--color-lime-50, #f7fde3); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TICKER = [
  'Wandelen na het eten verlaagt je bloedsuiker aanzienlijk',
  '5 snelle lunches die je de hele middag energie geven',
  'Mediterraan dieet vermindert ontstekingen — nieuw onderzoek bevestigt',
  'Mindfulness in 10 minuten: zo begin je vandaag nog',
];

/* ── Header ─────────────────────────────────────────────── */
function Header() {
  const [navHov, setNavHov] = React.useState(null);
  const links = ['Voeding','Beweging','Mindset','Recepten'];
  const now = new Date().toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
  return (
    <header style={{ background:'var(--color-neutral-900)', position:'sticky', top:0, zIndex:100 }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr auto 1fr', alignItems:'center', padding:'0 40px', height:'60px', borderBottom:'1px solid rgba(255,255,255,0.07)' }}>
        <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-neutral-500)', letterSpacing:'0.04em', fontVariantNumeric:'tabular-nums' }}>{now}</span>
        <a href="Homepage.html" style={{ fontFamily:'var(--font-display)', fontSize:'1.4375rem', fontWeight:700, letterSpacing:'-0.03em', color:'#fff', textDecoration:'none' }}>
          <span style={{ color:'var(--color-lime-400)' }}>In</span>Goedendoen<sup style={{ fontSize:'0.45em', color:'var(--color-lime-400)', marginLeft:'2px' }}>®</sup>
        </a>
        <div style={{ display:'flex', alignItems:'center', gap:'10px', justifyContent:'flex-end' }}>
          <button style={{ background:'none', border:'none', cursor:'pointer', color:'var(--color-neutral-400)', padding:'6px', display:'flex' }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <button style={{ background:'none', border:'1.5px solid rgba(255,255,255,0.18)', color:'rgba(255,255,255,0.75)', fontFamily:'var(--font-sans)', fontWeight:500, fontSize:'0.8125rem', borderRadius:'9999px', padding:'5px 15px', cursor:'pointer' }}>Inloggen</button>
          <button style={{ background:'var(--color-lime-400)', color:'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:700, fontSize:'0.8125rem', border:'none', borderRadius:'9999px', padding:'6px 17px', cursor:'pointer' }}>Nieuwsbrief</button>
        </div>
      </div>
      <div style={{ display:'flex', alignItems:'stretch', height:'38px' }}>
        <div style={{ background:'var(--color-lime-400)', color:'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:800, fontSize:'0.5625rem', letterSpacing:'0.18em', textTransform:'uppercase', display:'flex', alignItems:'center', padding:'0 14px', flexShrink:0 }}>Nieuws</div>
        <div style={{ flex:1, overflow:'hidden', display:'flex', alignItems:'center', borderRight:'1px solid rgba(255,255,255,0.07)' }}>
          <div className="igd-ticker-track">
            {[...TICKER,...TICKER].map((t,i) => (
              <span key={i} style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-neutral-400)', whiteSpace:'nowrap', padding:'0 28px' }}>
                {t}<span style={{ color:'var(--color-lime-400)', marginLeft:'28px' }}>★</span>
              </span>
            ))}
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'stretch', flexShrink:0 }}>
          {links.map(l => (
            <a key={l} href="#" onClick={e=>e.preventDefault()} onMouseEnter={()=>setNavHov(l)} onMouseLeave={()=>setNavHov(null)}
              style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', fontWeight:500, color: navHov===l?'#fff':'var(--color-neutral-400)', padding:'0 14px', display:'flex', alignItems:'center', textDecoration:'none', transition:'color 150ms', borderLeft:'1px solid rgba(255,255,255,0.07)' }}>{l}</a>
          ))}
        </div>
      </div>
    </header>
  );
}

/* ── Footer ─────────────────────────────────────────────── */
function Footer() {
  return (
    <footer style={{ borderTop:'1px solid var(--color-border-default)', padding:'28px 40px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:'16px', flexWrap:'wrap' }}>
      <div style={{ fontFamily:'var(--font-display)', fontSize:'1rem', fontWeight:700, letterSpacing:'-0.02em' }}>
        <span style={{ color:'var(--color-lime-400)' }}>In</span>Goedendoen
      </div>
      <p style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-text-tertiary)' }}>© 2026 InGoedendoen · Voor een gezond, fit en vrolijk leven.</p>
      <div style={{ display:'flex', gap:'20px' }}>
        {['Privacy','Contact','Over ons'].map(l => (
          <a key={l} href="#" onClick={e=>e.preventDefault()} style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-text-secondary)', textDecoration:'none' }}>{l}</a>
        ))}
      </div>
    </footer>
  );
}

/* ── Contact form ────────────────────────────────────────── */
function ContactForm() {
  const [form, setForm] = React.useState({ name:'', email:'', onderwerp:'', bericht:'' });
  const [sent, setSent] = React.useState(false);
  const [errors, setErrors] = React.useState({});
  const [hovBtn, setHovBtn] = React.useState(false);

  function validate() {
    const e = {};
    if (!form.name.trim())    e.name    = 'Vul je naam in.';
    if (!form.email.trim())   e.email   = 'Vul je e-mailadres in.';
    else if (!/\S+@\S+\.\S+/.test(form.email)) e.email = 'Geen geldig e-mailadres.';
    if (!form.bericht.trim()) e.bericht = 'Schrijf een bericht.';
    return e;
  }

  function submit(e) {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); return; }
    setSent(true);
  }

  if (sent) return (
    <div style={{ background:'var(--color-lime-50,#f7fde3)', border:'1.5px solid var(--color-lime-300,#c6e84a)', borderRadius:'var(--radius-lg)', padding:'32px', textAlign:'center' }}>
      <div style={{ width:'48px', height:'48px', borderRadius:'50%', background:'var(--color-lime-400)', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto 16px' }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--color-neutral-900)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h3 style={{ fontFamily:'var(--font-display)', fontSize:'1.25rem', fontWeight:700, color:'var(--color-text-primary)', marginBottom:'8px' }}>Bericht verzonden!</h3>
      <p style={{ fontFamily:'var(--font-sans)', fontSize:'0.9375rem', color:'var(--color-text-secondary)', lineHeight:1.6 }}>Bedankt voor je bericht. We reageren binnen 2 werkdagen.</p>
    </div>
  );

  return (
    <form onSubmit={submit} style={{ display:'flex', flexDirection:'column', gap:'20px' }} noValidate>
      {/* Name */}
      <div className="igd-field">
        <label className="igd-label">Naam</label>
        <input className="igd-input" type="text" placeholder="Je naam" value={form.name}
          onChange={e=>{ setForm(f=>({...f,name:e.target.value})); setErrors(er=>({...er,name:''})); }} />
        {errors.name && <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-pink-500)' }}>{errors.name}</span>}
      </div>

      {/* Email */}
      <div className="igd-field">
        <label className="igd-label">E-mail</label>
        <input className="igd-input" type="email" placeholder="jouw@email.nl" value={form.email}
          onChange={e=>{ setForm(f=>({...f,email:e.target.value})); setErrors(er=>({...er,email:''})); }} />
        {errors.email && <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-pink-500)' }}>{errors.email}</span>}
      </div>

      {/* Onderwerp */}
      <div className="igd-field">
        <label className="igd-label">Onderwerp</label>
        <select className="igd-select" value={form.onderwerp} onChange={e=>setForm(f=>({...f,onderwerp:e.target.value}))}>
          <option value="">Kies een onderwerp</option>
          <option value="vraag">Algemene vraag</option>
          <option value="tip">Tip of idee voor een artikel</option>
          <option value="samenwerking">Samenwerking</option>
          <option value="pers">Pers & media</option>
          <option value="overig">Overig</option>
        </select>
      </div>

      {/* Bericht */}
      <div className="igd-field">
        <label className="igd-label">Bericht</label>
        <textarea className="igd-input" rows={5} placeholder="Schrijf hier je bericht…" value={form.bericht}
          onChange={e=>{ setForm(f=>({...f,bericht:e.target.value})); setErrors(er=>({...er,bericht:''})); }} />
        {errors.bericht && <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-pink-500)' }}>{errors.bericht}</span>}
      </div>

      <button type="submit" onMouseEnter={()=>setHovBtn(true)} onMouseLeave={()=>setHovBtn(false)}
        style={{ background: hovBtn?'var(--color-neutral-900)':'var(--color-lime-400)', color: hovBtn?'#fff':'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:700, fontSize:'1rem', border:'none', borderRadius:'var(--radius-md)', padding:'14px', cursor:'pointer', width:'100%', transition:'all 160ms var(--ease-out)', letterSpacing:'-0.01em' }}>
        Verstuur bericht
      </button>
    </form>
  );
}

/* ── App ─────────────────────────────────────────────────── */
function App() {
  const CONTACT_ITEMS = [
    { icon: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>, label:'Redactie', value:'redactie@ingoedendoen.nl' },
    { icon: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>, label:'Artikel tips', value:'tips@ingoedendoen.nl' },
    { icon: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>, label:'Pers & media', value:'pers@ingoedendoen.nl' },
  ];

  return (
    <div style={{ display:'flex', flexDirection:'column', minHeight:'100vh' }}>
      <Header />

      <main style={{ flex:1 }}>
        <div style={{ maxWidth:'1280px', margin:'0 auto', padding:'40px 40px 72px' }}>

          {/* Breadcrumb */}
          <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'32px' }}>
            <a href="Homepage.html" style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', fontWeight:500, color:'var(--color-text-secondary)', textDecoration:'none', display:'flex', alignItems:'center', gap:'4px' }}
              onMouseEnter={e=>e.currentTarget.style.color='var(--color-lime-600)'} onMouseLeave={e=>e.currentTarget.style.color='var(--color-text-secondary)'}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              Home
            </a>
            <span style={{ color:'var(--color-neutral-300)', fontSize:'0.75rem' }}>/</span>
            <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-text-tertiary)' }}>Contact</span>
          </div>

          {/* 2-column layout: info | divider | form */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1px 1.6fr', gap:'0' }}>

            {/* ── Left: contact info ── */}
            <div style={{ paddingRight:'52px' }}>
              <h1 style={{ fontFamily:'var(--font-display)', fontSize:'2rem', fontWeight:700, letterSpacing:'-0.025em', lineHeight:1.15, marginBottom:'12px' }}>Neem contact op</h1>
              <p style={{ fontFamily:'var(--font-sans)', fontSize:'0.9375rem', lineHeight:1.68, color:'var(--color-text-secondary)', marginBottom:'32px' }}>
                Heb je een vraag, een tip voor een artikel, of wil je samenwerken? We horen het graag. Vul het formulier in of schrijf ons direct.
              </p>

              {/* Contact info items */}
              <div style={{ marginBottom:'32px' }}>
                <div style={{ fontFamily:'var(--font-sans)', fontSize:'0.625rem', fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:'var(--color-text-primary)', paddingBottom:'8px', borderBottom:'2px solid var(--color-lime-400)', display:'inline-block', marginBottom:'16px' }}>Contactgegevens</div>
                {CONTACT_ITEMS.map((item, i) => (
                  <div key={i} className="igd-contact-block">
                    <div style={{ fontFamily:'var(--font-sans)', fontSize:'0.75rem', fontWeight:600, color:'var(--color-text-tertiary)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:'4px' }}>{item.label}</div>
                    <a href={`mailto:${item.value}`} style={{ fontFamily:'var(--font-sans)', fontSize:'0.9375rem', color:'var(--color-blue-500)', textDecoration:'none', display:'flex', alignItems:'center', gap:'6px' }}
                      onMouseEnter={e=>e.currentTarget.style.color='var(--color-lime-600)'} onMouseLeave={e=>e.currentTarget.style.color='var(--color-blue-500)'}>
                      {item.value}
                    </a>
                  </div>
                ))}
              </div>

              {/* Response time */}
              <div style={{ background:'var(--color-neutral-50)', border:'1px solid var(--color-border-default)', borderRadius:'var(--radius-lg)', padding:'16px 18px', marginBottom:'28px', display:'flex', gap:'12px', alignItems:'flex-start' }}>
                <div style={{ width:'32px', height:'32px', borderRadius:'50%', background:'var(--color-lime-100)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--color-lime-600)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div>
                  <div style={{ fontFamily:'var(--font-sans)', fontSize:'0.875rem', fontWeight:600, color:'var(--color-text-primary)', marginBottom:'3px' }}>Reactietijd</div>
                  <div style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-text-secondary)', lineHeight:1.5 }}>We reageren doorgaans binnen 2 werkdagen op berichten.</div>
                </div>
              </div>

              {/* Social links */}
              <div>
                <div style={{ fontFamily:'var(--font-sans)', fontSize:'0.625rem', fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:'var(--color-text-tertiary)', marginBottom:'12px' }}>Volg ons</div>
                <div style={{ display:'flex', gap:'8px' }}>
                  {/* Instagram */}
                  <a href="#" onClick={e=>e.preventDefault()} className="igd-social" title="Instagram">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                  </a>
                  {/* Facebook */}
                  <a href="#" onClick={e=>e.preventDefault()} className="igd-social" title="Facebook">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                  </a>
                  {/* Pinterest */}
                  <a href="#" onClick={e=>e.preventDefault()} className="igd-social" title="Pinterest">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.24 2.65 7.86 6.39 9.29-.09-.78-.17-1.98.03-2.83.19-.77 1.27-5.37 1.27-5.37s-.32-.65-.32-1.61c0-1.51.88-2.64 1.97-2.64.93 0 1.38.7 1.38 1.54 0 .94-.6 2.34-.91 3.64-.26 1.09.54 1.97 1.61 1.97 1.93 0 3.42-2.04 3.42-4.97 0-2.6-1.87-4.42-4.53-4.42-3.09 0-4.9 2.31-4.9 4.71 0 .93.36 1.93.8 2.48.09.11.1.2.07.31-.08.33-.26 1.09-.3 1.24-.05.2-.16.24-.37.14-1.39-.65-2.26-2.68-2.26-4.32 0-3.51 2.55-6.74 7.36-6.74 3.86 0 6.86 2.75 6.86 6.42 0 3.83-2.41 6.9-5.76 6.9-1.13 0-2.19-.59-2.55-1.28l-.69 2.59c-.25.97-.93 2.18-1.39 2.91.05.01.1.02.15.03C12 22 12 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>
                  </a>
                </div>
              </div>
            </div>

            {/* Vertical divider */}
            <div style={{ background:'var(--color-border-default)', margin:'0' }} />

            {/* ── Right: image + form ── */}
            <div style={{ paddingLeft:'52px' }}>
              {/* Image */}
              <div style={{ borderRadius:'var(--radius-lg)', overflow:'hidden', aspectRatio:'16/7', marginBottom:'32px' }}>
                <img src="https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=1200&q=80" alt="InGoedendoen redactie" style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }} />
              </div>

              {/* Form */}
              <ContactForm />
            </div>
          </div>
        </div>
      </main>

      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
