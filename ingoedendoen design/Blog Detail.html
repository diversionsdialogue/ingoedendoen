<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20 minuten wandelen verandert meer dan je denkt — InGoedendoen</title>
<link rel="stylesheet" href="_ds/ingoedendoen-design-system-c7b6420c-4754-4083-b036-265964d0c5ff/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds/ingoedendoen-design-system-c7b6420c-4754-4083-b036-265964d0c5ff/_ds_bundle.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: var(--font-sans); background: var(--color-surface-page); color: var(--color-text-primary); -webkit-font-smoothing: antialiased; }
  #root { display: flex; flex-direction: column; min-height: 100%; }
  img { display: block; max-width: 100%; }

  /* Reading progress bar */
  #igd-progress {
    position: fixed; top: 0; left: 0; height: 3px; z-index: 200;
    background: var(--color-lime-400);
    transition: width 80ms linear;
  }

  /* Ticker */
  @keyframes igdTicker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .igd-ticker-track { display: flex; animation: igdTicker 36s linear infinite; }
  .igd-ticker-track:hover { animation-play-state: paused; }

  /* Section label */
  .igd-section-label {
    font-family: var(--font-sans); font-size: 0.625rem; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-text-primary);
    display: inline-block; padding-bottom: 8px; border-bottom: 2px solid var(--color-lime-400);
  }

  /* Article typography */
  .igd-body { font-family: var(--font-serif); font-size: 1.0625rem; line-height: 1.82; color: var(--color-text-primary); }
  .igd-body p { margin-bottom: 1.4em; }
  .igd-body h2 { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700;
    letter-spacing: -0.015em; color: var(--color-text-primary); margin: 2em 0 0.6em; line-height: 1.25; }
  .igd-body a { color: var(--color-blue-500); text-decoration: underline; text-underline-offset: 2px; }

  /* Sticky social column */
  .igd-social-col { position: sticky; top: 96px; align-self: start; display: flex; flex-direction: column; gap: 8px; width: 40px; }
  .igd-social-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--color-border-default);
    background: var(--color-surface-page); display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--color-text-tertiary); transition: border-color 150ms, color 150ms, background 150ms;
  }
  .igd-social-btn:hover { border-color: var(--color-lime-400); color: var(--color-lime-600); background: var(--color-lime-50, #f7fde3); }
  .igd-social-btn.active { background: var(--color-lime-400); border-color: var(--color-lime-400); color: var(--color-neutral-900); }
</style>
</head>
<body>
<div id="igd-progress"></div>
<div id="root"></div>
<script type="text/babel">

const CAT_COLOR = {
  voeding:'var(--color-lime-600)', beweging:'var(--color-blue-500)',
  mindset:'var(--color-pink-500)', recepten:'var(--color-neutral-500)',
};

const TICKER = [
  'Wandelen na het eten verlaagt je bloedsuiker aanzienlijk',
  '5 snelle lunches die je de hele middag energie geven',
  'Mediterraan dieet vermindert ontstekingen — nieuw onderzoek bevestigt',
  'Mindfulness in 10 minuten: zo begin je vandaag nog',
  'De beste oefeningen voor een sterke, pijnvrije rug',
];

const FEATURED_SIDEBAR = [
  { id:1, category:'beweging', title:'Zo maak je van elke dag een beweegdag', date:'10 jun', readTime:4 },
  { id:2, category:'recepten', title:'Havermout drie manieren — van saai naar subliem', date:'9 jun', readTime:3 },
  { id:3, category:'mindset',  title:'Waarom je brein rust nodig heeft', date:'8 jun', readTime:6 },
  { id:4, category:'voeding',  title:'De beste voeding voor je darmflora', date:'7 jun', readTime:7 },
];

/* ── Header ─────────────────────────────────────────────── */
function Header() {
  const [navHov, setNavHov] = React.useState(null);
  const links = ['Voeding', 'Beweging', 'Mindset', 'Recepten'];
  const now = new Date().toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
  return (
    <header style={{ background:'var(--color-neutral-900)', position:'sticky', top:0, zIndex:100 }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr auto 1fr', alignItems:'center', padding:'0 40px', height:'60px', borderBottom:'1px solid rgba(255,255,255,0.07)' }}>
        <div style={{ display:'flex', alignItems:'center', gap:'16px' }}>
          <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-neutral-500)', letterSpacing:'0.04em', fontVariantNumeric:'tabular-nums' }}>{now}</span>
        </div>
        <a href="Homepage.html" style={{ fontFamily:'var(--font-display)', fontSize:'1.4375rem', fontWeight:700, letterSpacing:'-0.03em', color:'#fff', textDecoration:'none', userSelect:'none' }}>
          <span style={{ color:'var(--color-lime-400)' }}>In</span>Goedendoen
          <sup style={{ fontSize:'0.45em', color:'var(--color-lime-400)', marginLeft:'2px' }}>®</sup>
        </a>
        <div style={{ display:'flex', alignItems:'center', gap:'10px', justifyContent:'flex-end' }}>
          <button style={{ background:'none', border:'none', cursor:'pointer', color:'var(--color-neutral-400)', padding:'6px', borderRadius:'6px', display:'flex' }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
          <button style={{ background:'none', border:'1.5px solid rgba(255,255,255,0.18)', color:'rgba(255,255,255,0.75)', fontFamily:'var(--font-sans)', fontWeight:500, fontSize:'0.8125rem', borderRadius:'9999px', padding:'5px 15px', cursor:'pointer' }}>Inloggen</button>
          <button style={{ background:'var(--color-lime-400)', color:'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:700, fontSize:'0.8125rem', border:'none', borderRadius:'9999px', padding:'6px 17px', cursor:'pointer' }}>Nieuwsbrief</button>
        </div>
      </div>
      <div style={{ display:'flex', alignItems:'stretch', height:'38px' }}>
        <div style={{ background:'var(--color-lime-400)', color:'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:800, fontSize:'0.5625rem', letterSpacing:'0.18em', textTransform:'uppercase', display:'flex', alignItems:'center', padding:'0 14px', flexShrink:0 }}>Nieuws</div>
        <div style={{ flex:1, overflow:'hidden', display:'flex', alignItems:'center', borderRight:'1px solid rgba(255,255,255,0.07)' }}>
          <div className="igd-ticker-track">
            {[...TICKER, ...TICKER].map((item, i) => (
              <span key={i} style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-neutral-400)', whiteSpace:'nowrap', padding:'0 28px' }}>
                {item}<span style={{ color:'var(--color-lime-400)', marginLeft:'28px' }}>★</span>
              </span>
            ))}
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'stretch', flexShrink:0 }}>
          {links.map(l => (
            <a key={l} href="#" onClick={e=>e.preventDefault()} onMouseEnter={() => setNavHov(l)} onMouseLeave={() => setNavHov(null)}
              style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', fontWeight:500, color: navHov===l ? '#fff' : 'var(--color-neutral-400)', padding:'0 14px', display:'flex', alignItems:'center', textDecoration:'none', transition:'color 150ms', borderLeft:'1px solid rgba(255,255,255,0.07)' }}>{l}</a>
          ))}
        </div>
      </div>
    </header>
  );
}

/* ── Sidebar featured item ───────────────────────────────── */
function SidebarItem({ art }) {
  const [hov, setHov] = React.useState(false);
  return (
    <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ padding:'14px 0', borderBottom:'1px solid var(--color-border-default)', cursor:'pointer' }}>
      <div style={{ display:'flex', gap:'6px', alignItems:'center', marginBottom:'5px' }}>
        <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.5625rem', fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase', color: CAT_COLOR[art.category] }}>{art.category}</span>
        <span style={{ color:'var(--color-neutral-300)', fontSize:'0.625rem' }}>·</span>
        <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.75rem', color:'var(--color-text-tertiary)' }}>{art.date} · {art.readTime} min</span>
      </div>
      <h4 style={{ fontFamily:'var(--font-display)', fontSize:'0.9rem', fontWeight:600, lineHeight:1.3, color: hov ? 'var(--color-lime-600)' : 'var(--color-text-primary)', transition:'color 150ms', textWrap:'balance' }}>{art.title}</h4>
    </div>
  );
}

/* ── Footer ─────────────────────────────────────────────── */
function Footer() {
  return (
    <footer style={{ borderTop:'1px solid var(--color-border-default)', padding:'28px 40px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:'16px', flexWrap:'wrap' }}>
      <div style={{ fontFamily:'var(--font-display)', fontSize:'1rem', fontWeight:700, letterSpacing:'-0.02em', color:'var(--color-text-primary)' }}>
        <span style={{ color:'var(--color-lime-400)' }}>In</span>Goedendoen
      </div>
      <p style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-text-tertiary)' }}>© 2026 InGoedendoen · Voor een gezond, fit en vrolijk leven.</p>
      <div style={{ display:'flex', gap:'20px' }}>
        {['Privacy','Contact','Over ons'].map(l => (
          <a key={l} href="#" onClick={e=>e.preventDefault()} style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-text-secondary)', textDecoration:'none' }}>{l}</a>
        ))}
      </div>
    </footer>
  );
}

/* ── Article body sections ───────────────────────────────── */
const SECTIONS = [
  {
    heading: '1. De wetenschap achter wandelen',
    paragraphs: [
      'Beweging heeft een direct effect op je spieren en stofwisseling — ook al is het maar een kwartier. Wanneer je loopt, trekken je spieren glucose rechtstreeks uit je bloed. Dat klinkt technisch, maar het betekent simpelweg: je lichaam verbrandt energie efficiënter zonder dat insuline hard hoeft te werken.',
      'Onderzoekers van de Universiteit van Limburg toonden aan dat mensen die dagelijks 20 minuten wandelden, een meetbaar lagere bloedsuikerspiegel hadden na de maaltijd. Het effect trad al op na de eerste week.',
    ]
  },
  {
    heading: '2. Bloedsuiker en wat dat voor jou betekent',
    paragraphs: [
      'Een stabiele bloedsuikerspiegel betekent minder energiedips, minder zin in zoetigheid en een betere concentratie. Vooral de piek die ontstaat na een koolhydraatrijke maaltijd — die klassieke "after-lunch-dip" — wordt aanzienlijk vlakker als je erna even wandelt.',
      'Je hoeft echt geen sportschoolsessie te plannen. Een rustige wandeling in je eigen tempo volstaat. Zelfs wie moeite heeft met intensief sporten, kan van dit effect profiteren.',
    ]
  },
  {
    heading: '3. Je humeur als bijkomend voordeel',
    paragraphs: [
      'Bewegen stimuleert de aanmaak van endorfines — je hersenen belonen je letterlijk voor de inspanning. Niet alleen pijnstillend, maar ook stemmingverbeterend. Na een wandeling voel je je doorgaans alerter, rustiger en meer in balans.',
      'Combineer je wandeling met frisse buitenlucht en je hebt een dubbel effect: daglicht helpt je bioritme, terwijl de beweging je stresshormonen verlaagt. Een kwartier buiten is geen luxe — het is onderhoud.',
    ]
  },
  {
    heading: '4. Hoe je het inbouwt in je dag',
    paragraphs: [
      'De makkelijkste manier: koppel de wandeling aan iets wat je toch al doet. Na je lunch? Perfect moment. Na het avondeten, voor de televisie aangaat? Nóg beter. Koppel het aan een vaste gewoonte en je hoeft er niet meer over na te denken.',
      'Start met vijf minuten als dat behapbaarder klinkt. Het gaat niet om de perfecte workout, maar om continuïteit. Tien keer vijf minuten per week heeft meer effect dan één lange sessie die je telkens uitstelt.',
    ]
  },
];

/* ── App ─────────────────────────────────────────────────── */
function App() {
  const [bookmarked, setBookmarked] = React.useState(false);
  const [copied, setCopied] = React.useState(false);
  const [newsVal, setNewsVal] = React.useState('');
  const [newsSent, setNewsSent] = React.useState(false);

  // Reading progress
  React.useEffect(() => {
    function onScroll() {
      const el = document.documentElement;
      const scrolled = el.scrollTop || document.body.scrollTop;
      const total = el.scrollHeight - el.clientHeight;
      const pct = total > 0 ? (scrolled / total) * 100 : 0;
      const bar = document.getElementById('igd-progress');
      if (bar) bar.style.width = pct + '%';
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  function handleCopy() {
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', minHeight:'100vh' }}>
      <Header />

      <main style={{ flex:1 }}>
        <div style={{ maxWidth:'1280px', margin:'0 auto', padding:'0 40px' }}>

          {/* Back link */}
          <div style={{ padding:'24px 0 0' }}>
            <a href="Homepage.html"
              style={{ display:'inline-flex', alignItems:'center', gap:'5px', fontFamily:'var(--font-sans)', fontSize:'0.8125rem', fontWeight:500, color:'var(--color-text-secondary)', textDecoration:'none', transition:'color 150ms' }}
              onMouseEnter={e => e.currentTarget.style.color='var(--color-lime-600)'}
              onMouseLeave={e => e.currentTarget.style.color='var(--color-text-secondary)'}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
              Terug naar overzicht
            </a>
          </div>

          {/* 2-column: article | sidebar */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 280px', gap:'0', paddingBottom:'64px' }}>

            {/* ── Article column ── */}
            <article style={{ paddingRight:'52px', paddingTop:'28px' }}>

              {/* Category + title + meta */}
              <div style={{ marginBottom:'20px' }}>
                <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.625rem', fontWeight:700, letterSpacing:'0.14em', textTransform:'uppercase', color:'var(--color-lime-600)', display:'inline-block', paddingBottom:'8px', borderBottom:'2px solid var(--color-lime-400)' }}>Voeding</span>
              </div>

              <h1 style={{ fontFamily:'var(--font-display)', fontSize:'2.25rem', fontWeight:700, lineHeight:1.15, letterSpacing:'-0.025em', color:'var(--color-text-primary)', marginBottom:'20px', textWrap:'balance' }}>
                20 minuten wandelen verandert meer dan je denkt
              </h1>

              {/* Author row */}
              <div style={{ display:'flex', alignItems:'center', gap:'12px', marginBottom:'28px', paddingBottom:'24px', borderBottom:'1px solid var(--color-border-default)' }}>
                <div style={{ width:'36px', height:'36px', borderRadius:'50%', background:'var(--color-lime-100)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-lime-600)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <div>
                  <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
                    <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.875rem', fontWeight:600, color:'var(--color-text-primary)' }}>Sophie van Dam</span>
                    <span style={{ color:'var(--color-neutral-300)', fontSize:'0.75rem' }}>·</span>
                    <span style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'var(--color-text-tertiary)' }}>Voedingsdeskundige</span>
                  </div>
                  <div style={{ fontFamily:'var(--font-sans)', fontSize:'0.75rem', color:'var(--color-text-tertiary)', marginTop:'2px', display:'flex', alignItems:'center', gap:'6px' }}>
                    <span>11 juni 2026</span>
                    <span>·</span>
                    <span style={{ display:'flex', alignItems:'center', gap:'3px' }}>
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                      5 min lezen
                    </span>
                  </div>
                </div>
              </div>

              {/* Hero image */}
              <div style={{ borderRadius:'var(--radius-lg)', overflow:'hidden', aspectRatio:'16/9', marginBottom:'32px' }}>
                <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=1200&q=80" alt="Wandelen en gezonde voeding" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
              </div>

              {/* Body: sticky social icons + text */}
              <div style={{ display:'grid', gridTemplateColumns:'48px 1fr', gap:'24px', alignItems:'start' }}>

                {/* Sticky social icons */}
                <div className="igd-social-col">
                  <button className="igd-social-btn" title="Delen">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                  </button>
                  <button
                    className={`igd-social-btn${bookmarked ? ' active' : ''}`}
                    onClick={() => setBookmarked(b => !b)} title={bookmarked ? 'Opgeslagen' : 'Bewaar artikel'}>
                    <svg width="15" height="15" viewBox="0 0 24 24" fill={bookmarked ? 'currentColor' : 'none'} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                  </button>
                  <button className="igd-social-btn" title="Reacties">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                  </button>
                  <button
                    className={`igd-social-btn${copied ? ' active' : ''}`}
                    onClick={handleCopy} title="Kopieer link">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                  </button>
                </div>

                {/* Article text */}
                <div className="igd-body">
                  {/* Lead paragraph */}
                  <p style={{ fontFamily:'var(--font-serif)', fontSize:'1.1875rem', lineHeight:1.75, color:'var(--color-text-primary)', fontWeight:400, marginBottom:'1.4em' }}>
                    Wist je dat een korte wandeling na het eten je bloedsuiker stabiliseert én je humeur verbetert? We leggen uit waarom beweging al na een kwartier een merkbaar verschil maakt voor je lichaam en geest — en hoe je het moeiteloos in je dag inbouwt.
                  </p>

                  {/* Divider */}
                  <div style={{ display:'flex', gap:'6px', marginBottom:'1.4em', color:'var(--color-neutral-400)', letterSpacing:'0.1em' }}>
                    <span>—</span>
                  </div>

                  {/* Body sections */}
                  {SECTIONS.map((s, i) => (
                    <div key={i}>
                      <h2>{s.heading}</h2>
                      {s.paragraphs.map((p, j) => <p key={j}>{p}</p>)}
                    </div>
                  ))}

                  {/* Pull quote */}
                  <blockquote style={{ borderLeft:'3px solid var(--color-lime-400)', paddingLeft:'24px', margin:'2em 0', fontFamily:'var(--font-serif)', fontSize:'1.1875rem', fontStyle:'italic', color:'var(--color-text-secondary)', lineHeight:1.7 }}>
                    "Tien keer vijf minuten per week heeft meer effect dan één lange sessie die je telkens uitstelt."
                  </blockquote>

                  <p>Kleine gewoontes stapelen op. Je hoeft je leven niet om te gooien voor een betere gezondheid — je past het gewoon aan. En dat begint met een paar stappen buiten de deur.</p>
                </div>
              </div>

              {/* Tags */}
              <div style={{ marginTop:'40px', paddingTop:'24px', borderTop:'1px solid var(--color-border-default)', display:'flex', gap:'8px', flexWrap:'wrap', paddingLeft:'72px' }}>
                {['wandelen', 'bloedsuiker', 'beweging', 'dagelijkse routine', 'gezonde gewoontes'].map(tag => (
                  <span key={tag} style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', fontWeight:500, color:'var(--color-text-secondary)', background:'var(--color-neutral-100)', border:'1px solid var(--color-border-default)', borderRadius:'9999px', padding:'4px 14px', cursor:'pointer' }}>
                    {tag}
                  </span>
                ))}
              </div>
            </article>

            {/* ── Sidebar ── */}
            <aside style={{ borderLeft:'1px solid var(--color-border-default)', paddingLeft:'32px', paddingTop:'28px', position:'sticky', top:'100px', alignSelf:'start', maxHeight:'calc(100vh - 120px)', overflowY:'auto' }}>

              {/* Uitgelicht */}
              <div style={{ marginBottom:'28px' }}>
                <div style={{ marginBottom:'16px' }}>
                  <span className="igd-section-label">Uitgelicht</span>
                </div>
                {FEATURED_SIDEBAR.map(a => <SidebarItem key={a.id} art={a} />)}
              </div>

              {/* Newsletter promo */}
              <div style={{ background:'var(--color-neutral-900)', borderRadius:'var(--radius-lg)', padding:'24px 20px', marginTop:'8px' }}>
                <div style={{ display:'inline-block', background:'var(--color-lime-400)', color:'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:800, fontSize:'0.5rem', letterSpacing:'0.18em', textTransform:'uppercase', borderRadius:'9999px', padding:'3px 12px', marginBottom:'14px' }}>Nieuwsbrief</div>
                <p style={{ fontFamily:'var(--font-display)', fontSize:'0.9375rem', fontWeight:700, color:'#fff', lineHeight:1.3, marginBottom:'10px', textWrap:'balance' }}>Wekelijks de beste gezondheidstips</p>
                <p style={{ fontFamily:'var(--font-sans)', fontSize:'0.8125rem', color:'rgba(255,255,255,0.5)', lineHeight:1.55, marginBottom:'16px' }}>Geen spam. Alleen content die je écht verder helpt.</p>
                {newsSent ? (
                  <div style={{ color:'var(--color-lime-400)', fontFamily:'var(--font-sans)', fontSize:'0.8125rem', fontWeight:500 }}>✓ Je staat ingeschreven!</div>
                ) : (
                  <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
                    <input value={newsVal} onChange={e => setNewsVal(e.target.value)} placeholder="jouw@email.nl"
                      style={{ fontFamily:'var(--font-sans)', fontSize:'0.875rem', background:'rgba(255,255,255,0.08)', border:'1.5px solid rgba(255,255,255,0.12)', borderRadius:'9999px', padding:'9px 16px', color:'#fff', outline:'none' }} />
                    <button onClick={() => newsVal && setNewsSent(true)}
                      style={{ background:'var(--color-lime-400)', color:'var(--color-neutral-900)', fontFamily:'var(--font-sans)', fontWeight:700, fontSize:'0.8125rem', border:'none', borderRadius:'9999px', padding:'9px', cursor:'pointer' }}>
                      Inschrijven →
                    </button>
                  </div>
                )}
              </div>
            </aside>
          </div>
        </div>
      </main>

      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
